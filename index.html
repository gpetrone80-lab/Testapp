<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHFR Resource Dashboard (Local - Config Embedded)</title>
    
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#111827">
    <link rel="apple-touch-icon" href="/images/icons/icon-192x192.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        .file-icon-pdf { color: #ef4444; }
        .file-icon-word { color: #3b82f6; }
        .mobile-tap-target { min-height: 44px; }
    </style>
</head>
<body class="bg-gray-100 font-sans text-gray-800" x-data="appData()">
    <div class="flex h-screen overflow-hidden">
        <div x-show="sidebarOpen" @click="sidebarOpen = false" class="fixed inset-0 bg-gray-900 bg-opacity-50 z-20 lg:hidden" x-cloak></div>
        <aside :class="sidebarOpen ? 'translate-x-0' : '-translate-x-full'" class="fixed inset-y-0 left-0 z-30 w-64 bg-slate-900 text-white transition-transform duration-300 ease-in-out lg:translate-x-0 lg:static lg:inset-0 shadow-xl flex flex-col">
            <div class="flex items-center justify-center h-20 bg-slate-800 border-b border-slate-700">
                <h1 class="text-2xl font-bold tracking-wider"><i class="fa-solid fa-fire-burner mr-2"></i>PHFR <span class="text-xs bg-red-600 rounded px-1 ml-1">LOCAL</span></h1>
            </div>
            <nav class="flex-1 px-4 py-6 space-y-2">
                <button @click="currentTab = 'home'; sidebarOpen = false" :class="currentTab === 'home' ? 'bg-red-600 text-white' : 'text-gray-400 hover:bg-slate-800 hover:text-white'" class="flex items-center w-full px-4 py-3 rounded-lg transition-colors mobile-tap-target">
                    <i class="fa-solid fa-house w-6"></i>
                    <span class="font-medium">Dashboard</span>
                </button>
                <button @click="currentTab = 'fire'; sidebarOpen = false" :class="currentTab === 'fire' ? 'bg-red-600 text-white' : 'text-gray-400 hover:bg-slate-800 hover:text-white'" class="flex items-center w-full px-4 py-3 rounded-lg transition-colors mobile-tap-target">
                    <i class="fa-solid fa-fire-extinguisher w-6"></i>
                    <span class="font-medium">Fire Resources</span>
                </button>
                <button @click="currentTab = 'ems'; sidebarOpen = false" :class="currentTab === 'ems' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-slate-800 hover:text-white'" class="flex items-center w-full px-4 py-3 rounded-lg transition-colors mobile-tap-target">
                    <i class="fa-solid fa-heart-pulse w-6"></i>
                    <span class="font-medium">EMS Resources</span>
                </button>
                <div class="pt-4 mt-4 border-t border-slate-700">
                    <p class="px-4 text-xs text-gray-500 uppercase font-bold mb-2">Data Management</p>
                    <button @click="exportData()" class="flex items-center w-full px-4 py-2 text-gray-400 hover:bg-slate-800 hover:text-green-400 transition-colors">
                        <i class="fa-solid fa-download w-6"></i>
                        <span class="font-medium text-sm">Export Config</span>
                    </button>
                     <label class="flex items-center w-full px-4 py-2 text-gray-400 hover:bg-slate-800 hover:text-blue-400 transition-colors cursor-pointer">
                        <i class="fa-solid fa-upload w-6"></i>
                        <span class="font-medium text-sm">Import Config</span>
                        <input type="file" accept=".json" class="hidden" @change="importData">
                    </label>
                    <button @click="masterReset()" class="flex items-center w-full px-4 py-2 text-red-400 hover:bg-red-900 hover:text-red-200 transition-colors mt-2">
                        <i class="fa-solid fa-triangle-exclamation w-6"></i>
                        <span class="font-medium text-sm">Master Reset</span>
                    </button>
                </div>
            </nav>
            <div class="p-4 border-t border-slate-700">
                <button @click="showUploadModal = true" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-4 rounded-lg shadow transition-colors flex justify-center items-center gap-2 mobile-tap-target">
                    <i class="fa-solid fa-plus"></i> Add Document
                </button>
            </div>
        </aside>
        <div class="flex-1 flex flex-col overflow-hidden">
            <header class="flex items-center justify-between p-4 bg-white shadow lg:hidden">
                <button @click="sidebarOpen = true" class="text-gray-600 focus:outline-none mobile-tap-target">
                    <i class="fa-solid fa-bars text-2xl"></i>
                </button>
                <span class="font-bold text-lg">PHFR Manager</span>
                <div class="w-6"></div>
            </header>
            <main class="flex-1 overflow-x-hidden overflow-y-auto bg-gray-100 p-4 md:p-6">
                <div x-show="currentTab === 'home'" x-cloak>
                    <div class="flex justify-between items-center mb-6 border-b pb-2">
                        <h2 class="text-2xl font-bold text-gray-800">Quick Links</h2>
                        <button @click="showLinkModal = true" class="text-sm text-blue-600 hover:text-blue-800 font-medium bg-blue-50 px-3 py-1 rounded border border-blue-200">
                            <i class="fa-solid fa-pen-to-square mr-1"></i> Edit Buttons
                        </button>
                    </div>
                    <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4">
                        <template x-for="link in links" :key="link.name">
                            <a :href="link.url" target="_blank" class="flex flex-col items-center justify-center p-4 bg-white rounded-xl shadow-sm hover:shadow-md hover:bg-red-50 transition border border-gray-200 cursor-pointer h-32 text-center group relative">
                                <i :class="link.icon" class="text-3xl mb-3 text-slate-600 group-hover:text-red-600 transition-colors"></i>
                                <span class="font-semibold text-sm text-gray-700" x-text="link.name"></span>
                            </a>
                        </template>
                    </div>
                </div>
                <div x-show="currentTab === 'fire'" x-cloak>
                    <div class="flex justify-between items-center mb-6 border-b pb-2">
                        <h2 class="text-2xl font-bold text-gray-800">Fire Documents</h2>
                        <span class="bg-red-100 text-red-800 text-xs font-semibold px-2.5 py-0.5 rounded" x-text="getFiles('Fire').length + ' Files'"></span>
                    </div>
                    <div class="bg-white rounded-lg shadow overflow-hidden">
                        <ul class="divide-y divide-gray-200">
                            <template x-for="file in getFiles('Fire')" :key="file.id">
                                <li class="p-4 flex flex-col sm:flex-row sm:items-center sm:justify-between hover:bg-gray-50 gap-4">
                                    <div class="flex items-center overflow-hidden">
                                        <i :class="getFileIcon(file.type)" class="text-2xl mr-4 flex-shrink-0"></i>
                                        <div class="min-w-0">
                                            <p class="font-medium text-gray-900 truncate" x-text="file.name"></p>
                                            <p class="text-xs text-gray-500" x-text="file.path"></p>
                                        </div>
                                    </div>
                                    <div class="flex space-x-2 flex-shrink-0">
                                        <a :href="file.url" target="_blank" class="flex items-center justify-center bg-blue-50 text-blue-700 hover:bg-blue-100 border border-blue-200 font-medium text-sm px-4 py-2 rounded shadow-sm transition-colors">
                                            <i class="fa-solid fa-folder-open mr-2"></i> Open
                                        </a>
                                        <button @click="deleteFile(file.id)" class="flex items-center justify-center bg-red-50 text-red-700 hover:bg-red-100 border border-red-200 font-medium text-sm px-3 py-2 rounded shadow-sm transition-colors" title="Delete Link">
                                            <i class="fa-solid fa-trash-can"></i>
                                        </button>
                                    </div>
                                </li>
                            </template>
                             <li x-show="getFiles('Fire').length === 0" class="p-8 text-center text-gray-500">
                                No Fire documents found. Add some using the sidebar button.
                            </li>
                        </ul>
                    </div>
                </div>
                <div x-show="currentTab === 'ems'" x-cloak>
                    <div class="flex justify-between items-center mb-6 border-b pb-2">
                        <h2 class="text-2xl font-bold text-gray-800">EMS Documents</h2>
                        <span class="bg-blue-100 text-blue-800 text-xs font-semibold px-2.5 py-0.5 rounded" x-text="getFiles('EMS').length + ' Files'"></span>
                    </div>
                    <div class="bg-white rounded-lg shadow overflow-hidden">
                        <ul class="divide-y divide-gray-200">
                            <template x-for="file in getFiles('EMS')" :key="file.id">
                                <li class="p-4 flex flex-col sm:flex-row sm:items-center sm:justify-between hover:bg-gray-50 gap-4">
                                    <div class="flex items-center overflow-hidden">
                                        <i :class="getFileIcon(file.type)" class="text-2xl mr-4 flex-shrink-0"></i>
                                        <div class="min-w-0">
                                            <p class="font-medium text-gray-900 truncate" x-text="file.name"></p>
                                            <p class="text-xs text-gray-500" x-text="file.path"></p>
                                        </div>
                                    </div>
                                    <div class="flex space-x-2 flex-shrink-0">
                                        <a :href="file.url" target="_blank" class="flex items-center justify-center bg-blue-50 text-blue-700 hover:bg-blue-100 border border-blue-200 font-medium text-sm px-4 py-2 rounded shadow-sm transition-colors">
                                            <i class="fa-solid fa-folder-open mr-2"></i> Open
                                        </a>
                                        <button @click="deleteFile(file.id)" class="flex items-center justify-center bg-red-50 text-red-700 hover:bg-red-100 border border-red-200 font-medium text-sm px-3 py-2 rounded shadow-sm transition-colors" title="Delete Link">
                                            <i class="fa-solid fa-trash-can"></i>
                                        </button>
                                    </div>
                                </li>
                            </template>
                            <li x-show="getFiles('EMS').length === 0" class="p-8 text-center text-gray-500">
                                No EMS documents found. Add some using the sidebar button.
                            </li>
                        </ul>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <div x-show="showUploadModal" class="fixed inset-0 z-50 overflow-y-auto" aria-labelledby="modal-title" role="dialog" aria-modal="true" x-cloak>
        <div class="flex items-end justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">
            <div x-show="showUploadModal" class="fixed inset-0 bg-gray-500 bg-opacity-75" @click="showUploadModal = false"></div>
            <span class="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true">&#8203;</span>
            <div x-show="showUploadModal" class="inline-block align-bottom bg-white rounded-lg text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-lg w-full">
                <div class="bg-white px-4 pt-5 pb-4 sm:p-6 sm:pb-4">
                    <h3 class="text-lg leading-6 font-bold text-gray-900" id="modal-title">Add Local File Reference</h3>
                    <div class="mt-4 space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Display Name</label>
                            <input type="text" x-model="newFile.name" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-red-500 focus:border-red-500 sm:text-sm">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Category</label>
                            <select x-model="newFile.category" class="mt-1 block w-full pl-3 pr-10 py-2 text-base border border-gray-300 focus:outline-none focus:ring-red-500 sm:text-sm rounded-md">
                                <option value="Fire">Fire</option>
                                <option value="EMS">EMS</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Select File</label>
                            <input type="file" @change="handleFileSelect" class="mt-1 block w-full text-sm text-gray-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700">File Path (Relative)</label>
                            <input type="text" x-model="newFile.path" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 bg-gray-50 text-gray-600 sm:text-sm">
                        </div>
                    </div>
                </div>
                <div class="bg-gray-50 px-4 py-3 sm:px-6 sm:flex sm:flex-row-reverse">
                    <button @click="addFile()" type="button" class="w-full inline-flex justify-center rounded-md border border-transparent shadow-sm px-4 py-2 bg-red-600 text-base font-medium text-white hover:bg-red-700 sm:ml-3 sm:w-auto sm:text-sm">Add Reference</button>
                    <button @click="showUploadModal = false" type="button" class="mt-3 w-full inline-flex justify-center rounded-md border border-gray-300 shadow-sm px-4 py-2 bg-white text-base font-medium text-gray-700 hover:bg-gray-50 sm:mt-0 sm:ml-3 sm:w-auto sm:text-sm">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Integrated links from phfr_dashboard_config (2).json
        const EMBEDDED_PHFR_CONFIG = {
            "links": [
                { "name": "Dispatch Center", "icon": "fa-solid fa-headset", "url": "https://911.pinellas.gov/" },
                { "name": "Image Trend Yellow", "icon": "fa-solid fa-cloud-sun-rain", "url": "https://pinellascounty.imagetrendelite.com/Elite/Organizationpinellascounty/?logout" },
                { "name": "Vector Solution", "icon": "fa-solid fa-road", "url": "https://app.targetsolutions.com/auth/index.cfm?action=login.showlogin&customerid=16061&customerpath=palmharborfire" },
                { "name": "Pinellas County Mom", "icon": "fa-solid fa-book-medical", "url": "https://pcemsomd.com/" },
                { "name": "Hospital Status", "icon": "fa-solid fa-hospital", "url": "https://hs.sunstarems.com/" },
                { "name": "Department Calendar", "icon": "fa-solid fa-calendar-days", "url": "https://outlook.office365.com/calendar/published/19aade923b7344d2a321b8ba62ae15b3@palmharborfd.com/73c49905a6fd44739ced72ca58399a0e3049452539445466519/calendar.html" },
                { "name": "HazMat Mom", "icon": "fa-solid fa-triangle-exclamation", "url": "https://pcemsomd.com/wp-admin/admin-ajax.php?juwpfisadmin=false&action=wpfd&task=file.download&wpfd_category_id=182&wpfd_file_id=17916&token=a4b2d66b00097418225526f1fa3d79c2&preview=1" },
                { "name": "Hospital specialty", "icon": "fa-solid fa-graduation-cap", "url": "https://hs.sunstarems.com/chart.html" },
                { "name": "PSTRAX Login", "icon": "fa-solid fa-wrench", "url": "https://app1.pstrax.com/" },
                { "name": "Dept Email", "icon": "fa-solid fa-envelope", "url": "https://login.microsoftonline.com/common/oauth2/v2.0/authorize?client_id=9199bf20-a13f-4107-85dc-02114787ef48&scope=https%3A%2F%2Foutlook.office.com%2F.default%20openid%20profile%20offline_access&redirect_uri=https%3A%2F%2Foutlook.live.com%2Fmail%2F&client-request-id=3dc34b5a-f05a-915e-c927-4679906cf2f5&response_mode=fragment&client_info=1&prompt=select_account&nonce=019c0ae0-9a6f-764c-9352-e564f711c1e9&state=eyJpZCI6IjAxOWMwYWUwLTlhNmYtN2ExOS1hNzRlLTg2YWNmOGYyZmM3MSIsIm1ldGEiOnsiaW50ZXJhY3Rpb25UeXBlIjoicmVkaXJlY3QifX0%3D%7CaHR0cHM6Ly9vdXRsb29rLmxpdmUuY29tL21haWwvMC8_ZGVlcGxpbms9bWFpbCUyRjAlMkY&claims=%7B%22access_token%22%3A%7B%22xms_cc%22%3A%7B%22values%22%3A%5B%22CP1%22%5D%7D%7D%7D&x-client-SKU=msal.js.browser&x-client-VER=4.26.0&response_type=code&code_challenge=iXQGi_2AY40obizmDB6Mu6ozacSUf4B0SabJQhCCglM&code_challenge_method=S256&cobrandid=ab0455a0-8d03-46b9-b18b-df2f57b9e44c&fl=dob,flname,wld" },
                { "name": "Morning Roll Call", "icon": "fa-solid fa-clipboard-user", "url": "file:///C:/Users/User/Documents/Petrone/Nuovo/Morning%20Roll%20Call.html" },
                { "name": "Smart draw", "icon": "fa-solid fa-book", "url": "https://www.smartdraw.com/myaccount/login.aspx" },
                { "name": "Fire Works", "icon": "fa-solid fa-map-location-dot", "url": "https://login.eprsys.com/Home/loginV3" },
                { "name": "Crewsense", "icon": "fa-solid fa-screwdriver-wrench", "url": "https://www.crewsense.com/Application/Login" },
                { "name": "911 Web", "icon": "fa-solid fa-users", "url": "http://911web/pincoweb/Login2.asp" }
            ],
            "allFiles": [],
            "exportedAt": "2/16/2026"
        };
    </script>
    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('appData', () => ({
                sidebarOpen: false,
                currentTab: 'home',
                showUploadModal: false,
                showLinkModal: false,
                links: [],
                allFiles: [],
                newFile: { name: '', category: 'Fire', path: '', type: '' },
                
                init() { this.loadFromLocal(); },
                loadFromLocal() {
                    const saved = localStorage.getItem('phfr_data_v2'); 
                    if (saved) {
                        try {
                            const parsed = JSON.parse(saved);
                            this.links = parsed.links || EMBEDDED_PHFR_CONFIG.links;
                            this.allFiles = parsed.allFiles || [];
                        } catch(e) { this.restoreDefaults(); }
                    } else { this.restoreDefaults(); }
                },
                saveToLocal() {
                    localStorage.setItem('phfr_data_v2', JSON.stringify({ links: this.links, allFiles: this.allFiles }));
                },
                restoreDefaults() {
                    this.links = JSON.parse(JSON.stringify(EMBEDDED_PHFR_CONFIG.links));
                    this.allFiles = [];
                    this.saveToLocal();
                },
                exportData() {
                    const data = JSON.stringify({ links: this.links, allFiles: this.allFiles, exportedAt: new Date().toLocaleDateString() });
                    const blob = new Blob([data], {type: 'application/json'});
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url; a.download = 'phfr_dashboard_config.json';
                    document.body.appendChild(a); a.click(); document.body.removeChild(a);
                },
                importData(event) {
                    const file = event.target.files[0];
                    if(!file) return;
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        try {
                            const data = JSON.parse(e.target.result);
                            if(confirm("Overwrite settings?")) {
                                this.links = data.links || EMBEDDED_PHFR_CONFIG.links;
                                this.allFiles = data.allFiles || [];
                                this.saveToLocal();
                                alert('Loaded!');
                            }
                        } catch(err) { alert('Invalid file.'); }
                    };
                    reader.readAsText(file);
                },
                masterReset() {
                    if(confirm("Master Reset?")) { localStorage.removeItem('phfr_data_v2'); location.reload(); }
                },
                getFiles(cat) { return this.allFiles.filter(f => f.category === cat); },
                handleFileSelect(e) {
                    const f = e.target.files[0];
                    if (f) {
                        if(!this.newFile.name) this.newFile.name = f.name.split('.')[0];
                        this.newFile.path = 'documents/' + f.name;
                        this.newFile.type = f.name.toLowerCase().includes('.pdf') ? 'pdf' : (f.name.toLowerCase().includes('.doc') ? 'word' : 'other');
                    }
                },
                addFile() {
                    if (!this.newFile.name || !this.newFile.path) return alert("Missing info");
                    this.allFiles.push({ id: 'doc_' + Date.now(), ...this.newFile, url: this.newFile.path });
                    this.saveToLocal();
                    this.newFile = { name: '', category: 'Fire', path: '', type: '' };
                    this.showUploadModal = false;
                },
                deleteFile(id) {
                    if (confirm(`Remove?`)) { this.allFiles = this.allFiles.filter(f => f.id !== id); this.saveToLocal(); }
                },
                getFileIcon(type) {
                    return type === 'pdf' ? 'fa-solid fa-file-pdf file-icon-pdf' : (type === 'word' ? 'fa-solid fa-file-word file-icon-word' : 'fa-solid fa-file text-gray-400');
                }
            }))
        });
    </script>
</body>
</html>\
